<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Garnet Agency - Candidate Catalog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        function catalogData() {
            return {
                lang: 'en',
                
                // Состояние фильтров
                filters: {
                    blood: 'all',
                    eyes: 'all',
                    hair: 'all',
                    height: 'all'
                },

                // База данных всех кандидатов (теперь 8 человек)
                candidates: [
                    { id: '26122001', age: 24, height: 181, weight: 58, blood: 'III', bloodFull: 'III (B) Rh+', eyes: 'green', hair: 'brown', link: 'ID26122001.html', photo: 'photos/ID26122001/8.jpg' },
                    { id: '25071999', age: 26, height: 169, weight: 52, blood: 'IV', bloodFull: 'IV (AB) Rh+', eyes: 'hazel', hair: 'light_brown', link: 'ID25071999.html', photo: 'photos/ID25071999/9.jpg' },
                    { id: '31031999', age: 27, height: 170, weight: 52, blood: 'I', bloodFull: 'I (A) Rh+', eyes: 'gray_green', hair: 'blonde', link: 'ID31031999.html', photo: 'photos/ID31031999/8.jpg' },
                    { id: '24012001', age: 25, height: 170, weight: 50, blood: 'I', bloodFull: 'I (O) Rh+', eyes: 'hazel', hair: 'light_brown', link: 'ID24012001.html', photo: 'photos/ID24012001/6.jpg' },
                    { id: '07011996', age: 27, height: 168, weight: 49, blood: 'III', bloodFull: 'III (B) Rh+', eyes: 'brown', hair: 'brown', link: 'ID07011996.html', photo: 'photos/ID07011996/16.jpg' },
                    { id: '20082004', age: new Date().getFullYear() - 2004, height: 175, weight: 57, blood: 'III', bloodFull: 'III (B) Rh+', eyes: 'gray', hair: 'light_brown', link: 'ID20082004.html', photo: 'photos/ID20082004/1.jpg' },
                    { id: '23062001', age: new Date().getFullYear() - 2001, height: 175, weight: 55, blood: 'I', bloodFull: 'I (O) Rh+', eyes: 'golden_brown', hair: 'brown', link: 'ID23062001.html', photo: 'photos/ID23062001/1.jpg' },
                    { id: '08051998', age: new Date().getFullYear() - 1998, height: 168, weight: 54, blood: 'IV', bloodFull: 'IV (AB)', eyes: 'brown', hair: 'light_brown', link: 'ID08051998.html', photo: 'photos/ID08051998/1.jpg' }
                ],

                // Логика работы фильтров
                get filteredCandidates() {
                    return this.candidates.filter(c => {
                        if (this.filters.blood !== 'all' && c.blood !== this.filters.blood) return false;
                        if (this.filters.eyes !== 'all' && c.eyes !== this.filters.eyes) return false;
                        if (this.filters.hair !== 'all' && c.hair !== this.filters.hair) return false;
                        if (this.filters.height !== 'all') {
                            if (this.filters.height === 'short' && c.height >= 170) return false;
                            if (this.filters.height === 'medium' && (c.height < 170 || c.height >= 175)) return false;
                            if (this.filters.height === 'tall' && c.height < 175) return false;
                        }
                        return true;
                    });
                },

                // Сброс фильтров
                resetFilters() {
                    this.filters = { blood: 'all', eyes: 'all', hair: 'all', height: 'all' };
                },

                // Языковые переводы
                translations: {
                    ru: {
                        agency: "Garnet International",
                        catalogTitle: "Каталог Кандидатов",
                        activeHeader: "Активные Анкеты",
                        subHeader: "Выберите кандидата для просмотра или воспользуйтесь фильтром",
                        nationality: "Украинка",
                        stats: { height: "Рост", blood: "Группа крови", eyes: "Глаза", hair: "Волосы" },
                        viewBtn: "Просмотреть досье",
                        statusActive: "Активна",
                        emptyState: "Кандидаты по выбранным параметрам не найдены.",
                        filterLabels: { blood: "Группа крови", eyes: "Цвет глаз", hair: "Цвет волос", height: "Рост", all: "Все", reset: "Сбросить фильтр" },
                        options: {
                            eyes: { green: "Зеленые", hazel: "Каре-зеленые", gray_green: "Серо-зеленые", brown: "Карие", gray: "Серые", golden_brown: "Золотисто-карие" },
                            hair: { brown: "Шатен / Коричневые", light_brown: "Русые", blonde: "Блонд" },
                            height: { short: "До 170 см", medium: "170 - 174 см", tall: "От 175 см" },
                            blood: { 'I': "I (O)", 'II': "II (A)", 'III': "III (B)", 'IV': "IV (AB)" }
                        }
                    },
                    uk: {
                        agency: "Garnet International",
                        catalogTitle: "Каталог Кандидатів",
                        activeHeader: "Активні Анкети",
                        subHeader: "Оберіть кандидата для перегляду або скористайтеся фільтром",
                        nationality: "Українка",
                        stats: { height: "Зріст", blood: "Група крові", eyes: "Очі", hair: "Волосся" },
                        viewBtn: "Переглянути досьє",
                        statusActive: "Активна",
                        emptyState: "Кандидатів за вибраними параметрами не знайдено.",
                        filterLabels: { blood: "Група крові", eyes: "Колір очей", hair: "Колір волосся", height: "Зріст", all: "Всі", reset: "Скинути фільтр" },
                        options: {
                            eyes: { green: "Зелені", hazel: "Каро-зелені", gray_green: "Сіро-зелені", brown: "Карі", gray: "Сірі", golden_brown: "Золотисто-карі" },
                            hair: { brown: "Шатен / Коричневе", light_brown: "Русяве", blonde: "Блонд" },
                            height: { short: "До 170 см", medium: "170 - 174 см", tall: "Від 175 см" },
                            blood: { 'I': "I (O)", 'II': "II (A)", 'III': "III (B)", 'IV': "IV (AB)" }
                        }
                    },
                    en: {
                        agency: "Garnet International",
                        catalogTitle: "Candidate Catalog",
                        activeHeader: "Active Dossiers",
                        subHeader: "Select a candidate to view or use the filters below",
                        nationality: "Ukrainian",
                        stats: { height: "Height", blood: "Blood Type", eyes: "Eyes", hair: "Hair" },
                        viewBtn: "View dossier",
                        statusActive: "Active",
                        emptyState: "No candidates found matching your criteria.",
                        filterLabels: { blood: "Blood Type", eyes: "Eye Color", hair: "Hair Color", height: "Height", all: "All", reset: "Reset Filters" },
                        options: {
                            eyes: { green: "Green", hazel: "Hazel", gray_green: "Gray-green", brown: "Brown", gray: "Gray", golden_brown: "Golden-brown" },
                            hair: { brown: "Brown", light_brown: "Light Brown", blonde: "Blonde" },
                            height: { short: "Under 170 cm", medium: "170 - 174 cm", tall: "175 cm and above" },
                            blood: { 'I': "I (O)", 'II': "II (A)", 'III': "III (B)", 'IV': "IV (AB)" }
                        }
                    },
                    cn: {
                        agency: "Garnet International",
                        catalogTitle: "候選人目錄",
                        activeHeader: "进行中的档案",
                        subHeader: "选择候选人以查看完整的机密档案或使用筛选器",
                        nationality: "乌克兰",
                        stats: { height: "身高", blood: "血型", eyes: "瞳色", hair: "发色" },
                        viewBtn: "查看详细档案",
                        statusActive: "活动中",
                        emptyState: "未找到符合所选条件的候选人。",
                        filterLabels: { blood: "血型", eyes: "瞳色", hair: "发色", height: "身高", all: "全部", reset: "重置筛选" },
                        options: {
                            eyes: { green: "绿色", hazel: "棕绿色", gray_green: "灰绿色", brown: "棕色", gray: "灰色", golden_brown: "金棕色" },
                            hair: { brown: "棕色", light_brown: "浅棕色", blonde: "金发" },
                            height: { short: "170 cm 以下", medium: "170 - 174 cm", tall: "175 cm 及以上" },
                            blood: { 'I': "I (O)", 'II': "II (A)", 'III': "III (B)", 'IV': "IV (AB)" }
                        }
                    }
                },
                t() { return this.translations[this.lang]; },
                
                // Склонение слова "год/лет" в зависимости от возраста
                getAgeSuffix(age) {
                    if (this.lang === 'en') return 'y.o.';
                    if (this.lang === 'cn') return '岁';
                    if (this.lang === 'uk') return 'років';
                    // Для русского
                    let count = age % 100;
                    if (count >= 10 && count <= 20) return 'лет';
                    let lastDigit = count % 10;
                    if (lastDigit === 1) return 'год';
                    if (lastDigit >= 2 && lastDigit <= 4) return 'года';
                    return 'лет';
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .card-hover:hover { transform: translateY(-8px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Стили для выпадающих списков фильтра */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='black' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position-x: 95%;
            background-position-y: 50%;
        }
        
        [x-cloak] { display: none !important; }
        img { background-color: #e5e7eb; object-fit: cover; }
    </style>
</head>
<body class="antialiased text-slate-800" x-data="catalogData()" x-cloak>

    <!-- Шапка -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 backdrop-blur-md bg-white/80">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div>
                    <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.3em] leading-none" x-text="t().agency"></p>
                    <h1 class="text-lg font-bold tracking-tight text-slate-900" x-text="t().catalogTitle"></h1>
                </div>
            </div>

            <!-- Переключатель языков -->
            <div class="flex gap-1 p-1 bg-slate-100 rounded-full border border-slate-200">
                <template x-for="l in ['ru', 'uk', 'en', 'cn']">
                    <button @click="lang = l" 
                        class="px-4 py-1.5 rounded-full text-[10px] font-black transition-all uppercase"
                        :class="lang === l ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'"
                        x-text="l">
                    </button>
                </template>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- Заголовок страницы -->
        <div class="mb-10 text-center md:text-left">
            <h2 class="text-4xl font-extralight text-slate-900 tracking-tight mb-2" x-text="t().activeHeader"></h2>
            <p class="text-slate-500 text-sm font-medium" x-text="t().subHeader"></p>
        </div>

        <!-- ================= БЛОК ФИЛЬТРОВ ================= -->
        <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm mb-10">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
                
                <!-- Группа крови -->
                <div class="w-full">
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1" x-text="t().filterLabels.blood"></label>
                    <select x-model="filters.blood" class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent block p-3 outline-none transition-all cursor-pointer">
                        <option value="all" x-text="t().filterLabels.all"></option>
                        <template x-for="(label, key) in t().options.blood" :key="key">
                            <option :value="key" x-text="label"></option>
                        </template>
                    </select>
                </div>

                <!-- Цвет глаз -->
                <div class="w-full">
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1" x-text="t().filterLabels.eyes"></label>
                    <select x-model="filters.eyes" class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent block p-3 outline-none transition-all cursor-pointer">
                        <option value="all" x-text="t().filterLabels.all"></option>
                        <template x-for="(label, key) in t().options.eyes" :key="key">
                            <option :value="key" x-text="label"></option>
                        </template>
                    </select>
                </div>

                <!-- Цвет волос -->
                <div class="w-full">
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1" x-text="t().filterLabels.hair"></label>
                    <select x-model="filters.hair" class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent block p-3 outline-none transition-all cursor-pointer">
                        <option value="all" x-text="t().filterLabels.all"></option>
                        <template x-for="(label, key) in t().options.hair" :key="key">
                            <option :value="key" x-text="label"></option>
                        </template>
                    </select>
                </div>

                <!-- Рост -->
                <div class="w-full">
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1" x-text="t().filterLabels.height"></label>
                    <select x-model="filters.height" class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent block p-3 outline-none transition-all cursor-pointer">
                        <option value="all" x-text="t().filterLabels.all"></option>
                        <template x-for="(label, key) in t().options.height" :key="key">
                            <option :value="key" x-text="label"></option>
                        </template>
                    </select>
                </div>

                <!-- Кнопка сброса -->
                <div class="w-full">
                    <button @click="resetFilters()" class="w-full px-6 py-3 bg-slate-100 hover:bg-rose-50 hover:text-rose-600 text-slate-500 text-xs font-black uppercase tracking-widest rounded-xl transition-colors h-[42px] flex items-center justify-center">
                        <span x-text="t().filterLabels.reset"></span>
                    </button>
                </div>

            </div>
        </div>
        <!-- ================= КОНЕЦ БЛОКА ФИЛЬТРОВ ================= -->

        <!-- Динамическая сетка кандидатов (Автоматически выводит 8 карточек) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <template x-for="c in filteredCandidates" :key="c.id">
                <a :href="c.link" class="card-hover group block">
                    <div class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-200 card-shadow flex flex-col h-full">
                        <div class="aspect-[4/5] relative overflow-hidden bg-slate-100">
                            <img :src="c.photo" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                            <div class="absolute top-4 right-4 bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-lg" x-text="t().statusActive"></div>
                        </div>
                        <div class="p-8 flex flex-col flex-grow">
                            <div class="mb-6">
                                <h3 class="text-2xl font-black text-slate-900 tracking-tighter leading-none mb-1 uppercase" x-text="'ID: ' + c.id"></h3>
                                <p class="text-blue-600 text-[10px] font-bold uppercase tracking-widest">
                                    <span x-text="t().nationality"></span>, <span x-text="c.age"></span> <span x-text="getAgeSuffix(c.age)"></span>
                                </p>
                            </div>
                            
                            <!-- Характеристики -->
                            <div class="space-y-3 mb-6">
                                <div class="flex justify-between border-b border-slate-50 pb-2 text-[11px]">
                                    <span class="text-slate-400 font-bold uppercase tracking-wider" x-text="t().stats.height"></span>
                                    <span class="text-slate-900 font-bold" x-text="c.height + ' см'"></span>
                                </div>
                                <div class="flex justify-between border-b border-slate-50 pb-2 text-[11px] text-blue-600">
                                    <span class="font-bold uppercase tracking-wider text-slate-400" x-text="t().stats.blood"></span>
                                    <span class="font-black" x-text="c.bloodFull"></span>
                                </div>
                                <div class="flex justify-between border-b border-slate-50 pb-2 text-[11px]">
                                    <span class="text-slate-400 font-bold uppercase tracking-wider" x-text="t().stats.eyes"></span>
                                    <span class="text-slate-900 font-bold" x-text="t().options.eyes[c.eyes]"></span>
                                </div>
                                <div class="flex justify-between text-[11px]">
                                    <span class="text-slate-400 font-bold uppercase tracking-wider" x-text="t().stats.hair"></span>
                                    <span class="text-slate-900 font-bold" x-text="t().options.hair[c.hair]"></span>
                                </div>
                            </div>

                            <div class="mt-auto pt-6 border-t border-slate-50 flex items-center justify-between group-hover:text-blue-600 transition-colors">
                                <span class="text-[10px] font-black uppercase tracking-widest" x-text="t().viewBtn"></span>
                                <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                            </div>
                        </div>
                    </div>
                </a>
            </template>
        </div>

        <!-- Сообщение, если фильтр ничего не нашел -->
        <div x-show="filteredCandidates.length === 0" class="text-center py-20 bg-white rounded-[2rem] border border-slate-200 border-dashed" x-cloak>
            <p class="text-slate-400 font-bold text-lg" x-text="t().emptyState"></p>
            <button @click="resetFilters()" class="mt-4 px-6 py-2 bg-blue-50 text-blue-600 text-xs font-black uppercase tracking-widest rounded-xl hover:bg-blue-100 transition-colors">
                <span x-text="t().filterLabels.reset"></span>
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer class="max-w-7xl mx-auto px-6 py-12 border-t border-slate-200 mt-10 flex flex-col md:flex-row justify-between items-center gap-6">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">© 2026 Garnet International Agency</p>
        <div class="flex gap-8">
            <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Verified Database</span>
            <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Confidential</span>
        </div>
    </footer>

</body>
</html>
